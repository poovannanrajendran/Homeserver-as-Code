services:
  n8n:
    image: n8nio/n8n:next
    restart: unless-stopped
    env_file:
      - .env
      - ../databases/.env
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${N8N_DB_NAME}
      DB_POSTGRESDB_USER: ${N8N_DB_USER}
      DB_POSTGRESDB_PASSWORD: ${N8N_DB_PASSWORD}
      N8N_PORT: 5678
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
    volumes:
      - /srv/data/platform/n8n:/home/node/.n8n
    ports:
      - "5678:5678"

  jenkins:
    image: jenkins/jenkins:latest
    restart: unless-stopped
    user: root
    volumes:
      - /srv/data/platform/jenkins:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8081:8080"
      - "50000:50000"

  nginx:
    image: nginx:latest
    restart: unless-stopped
    volumes:
      - /srv/data/platform/nginx:/usr/share/nginx/html
    ports:
      - "80:80"
